  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"zh-CN\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>WeTab · 新标签页<\u002Ftitle>\n  <style>/* ===== WeTab 风格新标签页 — 样式系统 ===== */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { height: 100%; margin: 0; }\n\n:root {\n  --font: \"PingFang SC\", \"Microsoft YaHei\", \"Helvetica Neue\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n\n  /* 玻璃质感（可被 JS 覆盖） */\n  --glass-blur: 22px;\n  --glass-sat: 165%;\n\n  /* 图标参数 */\n  --tile-radius: 22px;\n  --tile-size: 76px;\n  --grid-cols: 8;\n\n  /* 文字与卡面 —— 默认深色文字方案下被 [data-theme] 覆盖 */\n  --text: #f4f5f7;\n  --text-dim: rgba(244,245,247,.66);\n  --glass-bg: rgba(255,255,255,.16);\n  --glass-bg-strong: rgba(255,255,255,.24);\n  --glass-border: rgba(255,255,255,.26);\n  --glass-border-soft: rgba(255,255,255,.16);\n  --scrim: rgba(20,22,28,.18);\n  --panel-bg: rgba(28,30,38,.62);\n  --panel-text: #f4f5f7;\n  --shadow: 0 18px 50px rgba(0,0,0,.28);\n  --accent: #4a90d9;\n}\n\n/* 浅色主题：文字偏深、卡面偏白 */\n[data-theme=\"light\"] {\n  --text: #1d2129;\n  --text-dim: rgba(29,33,41,.6);\n  --glass-bg: rgba(255,255,255,.55);\n  --glass-bg-strong: rgba(255,255,255,.72);\n  --glass-border: rgba(255,255,255,.7);\n  --glass-border-soft: rgba(255,255,255,.5);\n  --scrim: rgba(255,255,255,.1);\n  --panel-bg: rgba(252,253,255,.82);\n  --panel-text: #1d2129;\n  --shadow: 0 18px 50px rgba(20,30,60,.18);\n}\n\n/* 深色主题：文字偏亮、卡面偏暗 */\n[data-theme=\"dark\"] {\n  --text: #f4f5f7;\n  --text-dim: rgba(244,245,247,.62);\n  --glass-bg: rgba(40,42,52,.5);\n  --glass-bg-strong: rgba(54,57,70,.62);\n  --glass-border: rgba(255,255,255,.16);\n  --glass-border-soft: rgba(255,255,255,.1);\n  --scrim: rgba(8,10,16,.42);\n  --panel-bg: rgba(24,26,34,.74);\n  --panel-text: #f4f5f7;\n  --shadow: 0 18px 50px rgba(0,0,0,.45);\n}\n\nbody {\n  font-family: var(--font);\n  color: var(--text);\n  overflow: hidden;\n  -webkit-font-smoothing: antialiased;\n  user-select: none;\n}\n\n/* ===== 壁纸层 ===== */\n#wallpaper {\n  position: fixed; inset: 0; z-index: -2;\n  background-size: cover; background-position: center;\n  transition: background 0.6s ease;\n}\n#scrim {\n  position: fixed; inset: 0; z-index: -1;\n  background: var(--scrim);\n  transition: background 0.4s ease;\n}\n\n/* ===== 整体布局 ===== */\n.app { display: flex; height: 100vh; }\n\n/* ===== 侧边栏 ===== */\n.sidebar {\n  width: 76px;\n  flex: 0 0 auto;\n  display: flex; flex-direction: column; align-items: center;\n  padding: 22px 0 18px;\n  gap: 8px;\n  background: var(--glass-bg);\n  border-right: 1px solid var(--glass-border-soft);\n  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));\n  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));\n  transition: width .26s cubic-bezier(.4,0,.2,1);\n  overflow: hidden;\n  z-index: 30;\n}\n.sidebar:hover { width: 176px; }\n\n.brand {\n  width: 44px; height: 44px; flex: 0 0 auto;\n  border-radius: 14px;\n  background: linear-gradient(135deg, #5b9df0, #3b6fd4);\n  display: grid; place-items: center;\n  box-shadow: 0 6px 16px rgba(59,111,212,.4);\n  margin-bottom: 14px;\n}\n.brand svg { width: 24px; height: 24px; }\n\n.nav { display: flex; flex-direction: column; gap: 6px; width: 100%; padding: 0 14px; }\n.nav-item {\n  display: flex; align-items: center; gap: 14px;\n  height: 48px; padding: 0 13px;\n  border: none; background: transparent; cursor: pointer;\n  border-radius: 14px; color: var(--text);\n  font-family: var(--font); font-size: 15px; white-space: nowrap;\n  transition: background .18s;\n}\n.nav-item .ico { width: 22px; height: 22px; flex: 0 0 auto; display: grid; place-items: center; }\n.nav-item .ico svg { width: 21px; height: 21px; }\n.nav-item .lbl { opacity: 0; transition: opacity .2s; }\n.sidebar:hover .nav-item .lbl { opacity: 1; }\n.nav-item:hover { background: var(--glass-bg-strong); }\n.nav-item.active { background: var(--glass-bg-strong); font-weight: 600; }\n.nav-item.active .ico { color: var(--accent); }\n\n.sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; gap: 8px; align-items: center; width: 100%; padding: 0 14px; }\n.side-btn {\n  display: flex; align-items: center; gap: 14px;\n  width: 100%; height: 44px; padding: 0 13px;\n  border: none; background: transparent; cursor: pointer;\n  border-radius: 14px; color: var(--text);\n  font-family: var(--font); font-size: 14px; white-space: nowrap;\n  transition: background .18s;\n}\n.side-btn .ico svg { width: 21px; height: 21px; }\n.side-btn .lbl { opacity: 0; transition: opacity .2s; }\n.sidebar:hover .side-btn .lbl { opacity: 1; }\n.side-btn:hover { background: var(--glass-bg-strong); }\n\n/* ===== 左下角设置浮动按钮 ===== */\n.fab-settings {\n  position: fixed; left: 22px; bottom: 22px; z-index: 50;\n  width: 46px; height: 46px; border-radius: 15px; cursor: pointer;\n  display: grid; place-items: center;\n  background: var(--glass-bg);\n  border: 1px solid var(--glass-border-soft);\n  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));\n  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));\n  color: var(--text); box-shadow: var(--shadow);\n  transition: transform .18s, background .18s;\n}\n.fab-settings:hover { transform: rotate(40deg); background: var(--glass-bg-strong); }\n.fab-settings svg { width: 22px; height: 22px; }\n\n/* 数据备份按钮组 */\n.data-btns { display: flex; gap: 10px; }\n.data-btns .btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px; }\n.bico svg { width: 16px; height: 16px; }\n\n/* ===== 主舞台 ===== */\n.stage { flex: 1; position: relative; overflow-y: auto; overflow-x: hidden; }\n.stage::-webkit-scrollbar { width: 0; }\n\n.topbar {\n  position: absolute; top: 22px; right: 28px;\n  display: flex; align-items: center; gap: 12px; z-index: 20;\n}\n.chip {\n  display: flex; align-items: center; gap: 9px;\n  height: 44px; padding: 0 15px;\n  border-radius: 16px; cursor: pointer;\n  background: var(--glass-bg);\n  border: 1px solid var(--glass-border-soft);\n  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));\n  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));\n  color: var(--text); font-size: 14px;\n  box-shadow: var(--shadow);\n  transition: transform .15s, background .18s;\n}\n.chip:hover { transform: translateY(-1px); background: var(--glass-bg-strong); }\n.chip svg { width: 20px; height: 20px; }\n.icon-btn {\n  width: 44px; height: 44px; padding: 0; justify-content: center;\n}\n.weather-temp { font-size: 18px; font-weight: 600; letter-spacing: -.5px; }\n.weather-meta { display: flex; flex-direction: column; line-height: 1.15; }\n.weather-meta small { font-size: 11px; color: var(--text-dim); }\n\n/* ===== 中部内容 ===== */\n.content {\n  min-height: 100%;\n  display: flex; flex-direction: column; align-items: center;\n  padding: 64px 40px 80px;\n}\n\n.hero { text-align: center; margin-bottom: 30px; }\n.greeting { font-size: 16px; color: var(--text-dim); margin: 0 0 6px; letter-spacing: .5px; }\n.clock {\n  font-size: 78px; font-weight: 250; line-height: 1; letter-spacing: -2px;\n  text-shadow: 0 2px 24px rgba(0,0,0,.18);\n  font-variant-numeric: tabular-nums;\n}\n.clock .sec { font-size: 30px; font-weight: 300; opacity: .6; margin-left: 8px; vertical-align: 6px; }\n.date-line { font-size: 17px; color: var(--text-dim); margin-top: 10px; letter-spacing: 1px; }\n\n/* ===== 搜索框 ===== */\n.searchwrap { width: 100%; max-width: 660px; position: relative; margin-bottom: 56px; }\n.search {\n  display: flex; align-items: center;\n  height: 58px; padding: 0 8px 0 6px;\n  border-radius: 18px;\n  background: var(--glass-bg-strong);\n  border: 1px solid var(--glass-border);\n  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));\n  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));\n  box-shadow: var(--shadow);\n  transition: box-shadow .2s, border-color .2s;\n}\n.search:focus-within { border-color: var(--accent); box-shadow: 0 10px 40px rgba(74,144,217,.3); }\n.engine-btn {\n  display: flex; align-items: center; gap: 4px;\n  height: 44px; padding: 0 10px; margin: 0 2px;\n  border: none; background: transparent; cursor: pointer;\n  border-radius: 12px; color: var(--text);\n  transition: background .15s;\n}\n.engine-btn:hover { background: var(--glass-bg); }\n.engine-glyph { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; font-weight: 700; font-size: 14px; color: #fff; }\n.engine-btn .caret { opacity: .5; }\n.search input {\n  flex: 1; height: 100%; border: none; background: transparent; outline: none;\n  font-family: var(--font); font-size: 17px; color: var(--text); padding: 0 8px;\n  user-select: text;\n}\n.search input::placeholder { color: var(--text-dim); }\n.search .go {\n  width: 44px; height: 44px; border: none; cursor: pointer; border-radius: 12px;\n  background: transparent; color: var(--text-dim); display: grid; place-items: center;\n  transition: background .15s, color .15s;\n}\n.search .go:hover { background: var(--glass-bg); color: var(--text); }\n\n.engine-menu {\n  position: absolute; top: 66px; left: 0;\n  background: var(--panel-bg); color: var(--panel-text);\n  border: 1px solid var(--glass-border-soft);\n  backdrop-filter: blur(calc(var(--glass-blur) + 6px)) saturate(var(--glass-sat));\n  -webkit-backdrop-filter: blur(calc(var(--glass-blur) + 6px)) saturate(var(--glass-sat));\n  border-radius: 16px; padding: 8px; width: 220px;\n  box-shadow: var(--shadow); z-index: 40;\n  display: none; flex-direction: column; gap: 2px;\n}\n.engine-menu.open { display: flex; animation: pop .16s ease; }\n.engine-opt {\n  display: flex; align-items: center; gap: 12px;\n  padding: 9px 10px; border-radius: 10px; cursor: pointer; font-size: 14px;\n  border: none; background: transparent; color: var(--panel-text); font-family: var(--font);\n  text-align: left;\n}\n.engine-opt:hover { background: var(--glass-bg-strong); }\n.engine-opt.active { background: var(--glass-bg-strong); }\n.engine-opt .engine-glyph { width: 24px; height: 24px; font-size: 13px; }\n\n/* ===== 图标网格 ===== */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(var(--grid-cols), 1fr);\n  gap: 18px 8px;\n  width: 100%; max-width: 980px;\n}\n.tile {\n  display: flex; flex-direction: column; align-items: center; gap: 9px;\n  padding: 6px 2px; border-radius: 16px; cursor: pointer;\n  position: relative;\n  transition: transform .14s, background .15s;\n}\n.tile:hover { background: var(--glass-bg); }\n.tile.dragging { opacity: .35; }\n.tile.merge-target .icon-wrap { transform: scale(1.12); box-shadow: 0 0 0 4px var(--accent), var(--shadow); }\n.tile.insert-before::before, .tile.insert-after::after {\n  content: \"\"; position: absolute; top: 8px; bottom: 26px; width: 3px;\n  border-radius: 3px; background: var(--accent);\n}\n.tile.insert-before::before { left: -6px; }\n.tile.insert-after::after { right: -6px; }\n\n.icon-wrap {\n  width: var(--tile-size); height: var(--tile-size);\n  border-radius: var(--tile-radius);\n  display: grid; place-items: center; position: relative;\n  box-shadow: 0 8px 20px rgba(0,0,0,.22);\n  overflow: hidden;\n  transition: transform .14s, box-shadow .14s;\n  background: #fff;\n}\n.tile:hover .icon-wrap { transform: translateY(-3px); }\n.icon-wrap .mono { font-size: 34px; font-weight: 700; color: #fff; }\n.icon-wrap img { width: 100%; height: 100%; object-fit: cover; }\n\n/* 文件夹缩略 */\n.icon-wrap.folder {\n  background: var(--glass-bg-strong);\n  border: 1px solid var(--glass-border-soft);\n  backdrop-filter: blur(10px);\n  -webkit-backdrop-filter: blur(10px);\n  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;\n  gap: 6px; padding: 11px;\n}\n.folder-mini { border-radius: 8px; display: grid; place-items: center; overflow: hidden; }\n.folder-mini .mm { font-size: 13px; font-weight: 700; color: #fff; }\n.folder-mini img { width: 100%; height: 100%; object-fit: cover; }\n\n.tile .label {\n  font-size: 13px; color: var(--text); text-align: center;\n  max-width: 84px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;\n  text-shadow: 0 1px 6px rgba(0,0,0,.3);\n}\n[data-theme=\"light\"] .tile .label { text-shadow: 0 1px 3px rgba(255,255,255,.6); }\n\n.tile-menu-btn {\n  position: absolute; top: 2px; right: 8px;\n  width: 22px; height: 22px; border-radius: 50%;\n  background: rgba(0,0,0,.5); color: #fff; border: none; cursor: pointer;\n  display: none; place-items: center; font-size: 14px; line-height: 1;\n  z-index: 2;\n}\n.tile:hover .tile-menu-btn { display: grid; }\n\n/* 添加按钮瓦片 */\n.tile.add .icon-wrap {\n  background: var(--glass-bg); border: 1.5px dashed var(--glass-border);\n  box-shadow: none; color: var(--text-dim);\n}\n.tile.add .icon-wrap svg { width: 30px; height: 30px; }\n.tile.add:hover .icon-wrap { background: var(--glass-bg-strong); }\n\n/* ===== 空状态（程序/购物占位） ===== */\n.empty-view {\n  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;\n  gap: 14px; color: var(--text-dim); text-align: center; padding-top: 60px;\n}\n.empty-view .e-ico {\n  width: 88px; height: 88px; border-radius: 26px; display: grid; place-items: center;\n  background: var(--glass-bg); border: 1px solid var(--glass-border-soft);\n  backdrop-filter: blur(var(--glass-blur));\n}\n.empty-view .e-ico svg { width: 40px; height: 40px; }\n.empty-view h2 { margin: 6px 0 0; color: var(--text); font-weight: 600; }\n\n/* ===== 通用：上下文菜单 ===== */\n.ctx-menu {\n  position: fixed; min-width: 148px; z-index: 200;\n  background: var(--panel-bg); color: var(--panel-text);\n  border: 1px solid var(--glass-border-soft);\n  backdrop-filter: blur(calc(var(--glass-blur) + 6px)) saturate(var(--glass-sat));\n  -webkit-backdrop-filter: blur(calc(var(--glass-blur) + 6px)) saturate(var(--glass-sat));\n  border-radius: 14px; padding: 6px; box-shadow: var(--shadow);\n  display: none; animation: pop .14s ease;\n}\n.ctx-menu.open { display: block; }\n.ctx-item {\n  display: flex; align-items: center; gap: 10px;\n  width: 100%; padding: 9px 11px; border-radius: 9px; cursor: pointer;\n  border: none; background: transparent; color: var(--panel-text);\n  font-family: var(--font); font-size: 14px; text-align: left;\n}\n.ctx-item:hover { background: var(--glass-bg-strong); }\n.ctx-item.danger { color: #ff6b6b; }\n.ctx-item svg { width: 17px; height: 17px; }\n\n/* ===== 模态框 ===== */\n.overlay {\n  position: fixed; inset: 0; z-index: 120;\n  background: rgba(10,12,18,.4);\n  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);\n  display: none; align-items: center; justify-content: center;\n}\n.overlay.open { display: flex; animation: fade .2s ease; }\n.modal {\n  width: 420px; max-width: calc(100vw - 40px);\n  background: var(--panel-bg); color: var(--panel-text);\n  border: 1px solid var(--glass-border-soft);\n  backdrop-filter: blur(calc(var(--glass-blur) + 10px)) saturate(var(--glass-sat));\n  -webkit-backdrop-filter: blur(calc(var(--glass-blur) + 10px)) saturate(var(--glass-sat));\n  border-radius: 22px; padding: 26px; box-shadow: var(--shadow);\n  animation: rise .24s cubic-bezier(.2,.7,.3,1);\n}\n.modal h3 { margin: 0 0 20px; font-size: 19px; font-weight: 600; }\n.field { margin-bottom: 16px; }\n.field label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 7px; }\n.field input[type=\"text\"], .field input[type=\"url\"] {\n  width: 100%; height: 44px; padding: 0 14px; border-radius: 12px;\n  border: 1px solid var(--glass-border-soft); background: var(--glass-bg);\n  color: var(--panel-text); font-family: var(--font); font-size: 15px; outline: none;\n  user-select: text;\n}\n.field input:focus { border-color: var(--accent); }\n.swatches { display: flex; flex-wrap: wrap; gap: 9px; }\n.swatch {\n  width: 30px; height: 30px; border-radius: 9px; cursor: pointer;\n  border: 2px solid transparent; transition: transform .12s;\n}\n.swatch:hover { transform: scale(1.1); }\n.swatch.active { border-color: var(--panel-text); transform: scale(1.12); }\n.preview-row { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }\n.preview-row .pv {\n  width: 60px; height: 60px; border-radius: var(--tile-radius); flex: 0 0 auto;\n  display: grid; place-items: center; box-shadow: 0 6px 16px rgba(0,0,0,.25);\n}\n.preview-row .pv .mono { font-size: 28px; font-weight: 700; color: #fff; }\n.preview-row .pv img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }\n.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }\n.btn {\n  height: 42px; padding: 0 20px; border-radius: 12px; cursor: pointer;\n  font-family: var(--font); font-size: 14px; font-weight: 500; border: none;\n  transition: transform .12s, filter .15s;\n}\n.btn:hover { transform: translateY(-1px); }\n.btn.primary { background: var(--accent); color: #fff; }\n.btn.primary:hover { filter: brightness(1.08); }\n.btn.ghost { background: var(--glass-bg); color: var(--panel-text); border: 1px solid var(--glass-border-soft); }\n.btn.full { width: 100%; }\n\n/* ===== 文件夹弹层 ===== */\n.folder-modal { width: 540px; }\n.folder-modal .ftitle {\n  font-size: 20px; font-weight: 600; background: transparent; border: none;\n  color: var(--panel-text); font-family: var(--font); text-align: center;\n  width: 100%; outline: none; margin-bottom: 22px; user-select: text;\n  border-bottom: 1.5px solid transparent; padding: 4px;\n}\n.folder-modal .ftitle:focus { border-bottom-color: var(--accent); }\n.folder-grid {\n  display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px 8px;\n  min-height: 100px;\n}\n\n/* ===== 设置面板 ===== */\n.settings-panel {\n  position: fixed; top: 0; right: 0; bottom: 0; width: 380px; max-width: 90vw;\n  background: var(--panel-bg); color: var(--panel-text);\n  border-left: 1px solid var(--glass-border-soft);\n  backdrop-filter: blur(calc(var(--glass-blur) + 10px))
